name: Build and Push to Amazon ECR

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: write
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./app
        
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: StrongPassword123!
          POSTGRES_DB: gitops_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run JUnit Tests
        run: |
          chmod +x ./mvnw
          ./mvnw test

      - name: Build Application
        run: ./mvnw package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: app-migration-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/app-migration-repo:${{ github.sha }}'
          format: 'table'
          exit-code: '1' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: app-migration-repo
          IMAGE_TAG: ${{ github.sha }}
        run: docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Kubernetes Manifest for ArgoCD
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: app-migration-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git pull --rebase --autostash origin main
          sed -i "s|image: .*|image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" ../k8s/deployment.yaml
          git add ../k8s/deployment.yaml          
          if git diff --staged --quiet; then
            echo "No changes to commit. Image tag is already up to date."
          else
            git commit -m "CI: update deployment image to $IMAGE_TAG"
            git push origin main
          fi

      - name: Record deployment in audit API
        if: success()
        env:
          APP_URL: ${{ secrets.APP_MIGRATION_API_URL }}
        run: |
          set -e

          APP_ID=$(curl -sf -X POST "$APP_URL/api/applications" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "AppMigration",
              "description": "Cloud-native deployment auditing service",
              "gitRepoUrl": "https://github.com/${{ github.repository }}"
            }' | jq -r '.id')

          if [ -z "$APP_ID" ] || [ "$APP_ID" == "null" ]; then
            echo "Failed to get application ID, skipping audit record."
            exit 0
          fi

          DEPLOYMENT_ID=$(curl -sf -X POST "$APP_URL/api/applications/$APP_ID/deployments" \
            -H "Content-Type: application/json" \
            -d "{
              \"imageTag\": \"${{ github.sha }}\",
              \"status\": \"Healthy\"
            }" | jq -r '.id')

          if [ -z "$DEPLOYMENT_ID" ] || [ "$DEPLOYMENT_ID" == "null" ]; then
            echo "Failed to get deployment ID, skipping pipeline run record."
            exit 0
          fi

          curl -sf -X POST "$APP_URL/api/deployments/$DEPLOYMENT_ID/pipeline-runs" \
            -H "Content-Type: application/json" \
            -d "{
              \"commitSha\": \"${{ github.sha }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"triggeredBy\": \"github-actions\",
              \"outcome\": \"SUCCESS\"
            }"

          echo "Audit trail recorded for deployment $DEPLOYMENT_ID"