# ─────────────────────────────────────────────────────────────
# Deployment — Spring Boot Application
# Managed by ArgoCD. Image tag is updated automatically by
# the GitHub Actions CI pipeline on every push to main.
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-migration
  namespace: default
  labels:
    app: app-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-migration
  template:
    metadata:
      labels:
        app: app-migration
    spec:
      containers:
        - name: app-migration
          # This line is updated automatically by the CI pipeline (ci.yml)
          image: 315401414097.dkr.ecr.us-east-1.amazonaws.com/app-migration-repo:d2e6b843f28d41007b87fdc7aa3c8ebe0862a14e
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SPRING_DATASOURCE_PASSWORD
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "350Mi"
              cpu: "500m"